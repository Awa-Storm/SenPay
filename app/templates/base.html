<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenPay - Paiement Mobile Sécurisé</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block styles %}{% endblock %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="bg-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
    </div>
    <div class="app-container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="logo">
                <span style="font-size: 26px; line-height: 1;">📱</span>
                <div style="display: flex; flex-direction: column; line-height: 1.15;">
                    <span>SenPay</span>
                    <small style="font-size: 11px; font-weight: 500; color: #9aa1ac; -webkit-text-fill-color: #9aa1ac;">Paiement mobile sécurisé</small>
                </div>
            </div>
            <div class="navbar-right">
                {% if session.user_id %}
                    <span><i class="fas fa-user-circle"></i> {{ session.phone or session.user_id }}</span>
                    <a href="{{ url_for('auth.logout') }}" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
                {% endif %}
            </div>
        </nav>

        <!-- Contenu -->
        <main>
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 SenPay · Paiement Mobile Sécurisé</p>
            <p style="font-size: 12px; margin-top: 4px; opacity: 0.6;">
                <i class="fas fa-lock"></i> HMAC-SHA256 · AES-256-GCM · RBAC
            </p>
        </footer>
    </div>
</body>
</html>

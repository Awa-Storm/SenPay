{% extends "base.html" %}

{% block content %}
<div class="change-pin-hero">
    <div class="card-modern" style="max-width: 500px; margin: 40px auto; text-align: center;">
        <div style="font-size: 56px; text-align: center;">🔐</div>
        <h1 style="font-size: 32px; color: #1a3e60; margin-top: 10px;">Changer mon PIN</h1>
        <p style="color: #666; font-size: 14px; margin-bottom: 25px;">
            Choisissez un nouveau code PIN sécurisé.
        </p>

        {% if error %}
            <div style="background: #fff0f0; border: 1px solid #D32F2F; color: #D32F2F; padding: 12px; border-radius: 12px; margin-bottom: 20px;">
                ❌ {{ error }}
            </div>
        {% endif %}

        {% if message %}
            <div style="background: #f0fff4; border: 1px solid #00C853; color: #00C853; padding: 12px; border-radius: 12px; margin-bottom: 20px;">
                ✅ {{ message }}
            </div>
        {% endif %}

        <form method="POST">
            <input type="password" name="old_pin" class="login-input" placeholder="🔐 Ancien PIN" required>
            <input type="password" name="new_pin" class="login-input" placeholder="🆕 Nouveau PIN" required>
            <input type="password" name="confirm_pin" class="login-input" placeholder="✅ Confirmer le nouveau PIN" required>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">Changer le PIN →</button>
        </form>

        <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #999;">
            🔐 PIN haché bcrypt coût 12 · Jamais stocké en clair
        </p>
    </div>
</div>
{% endblock %}

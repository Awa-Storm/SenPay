{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <span class="icon">📱</span>
        <h1><span>SenPay</span></h1>
        <p class="sub">Paiement mobile sécurisé</p>

        {% if error %}
            <div style="background: #fee2e2; padding: 10px; border-radius: 12px; margin-bottom: 16px; font-size: 13px; color: #b91c1c;">
                ❌ {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            <input type="tel" name="phone" placeholder="Numéro de téléphone" required>
            <input type="password" name="pin" placeholder="Code PIN" required>
            <button type="submit" class="btn-primary">Se connecter →</button>
        </form>

        <div class="footer-links">
            <p>🔒 Session chiffrée</p>
            <p style="margin-top: 6px;">
                Pas encore de compte ? <a href="{{ url_for('auth.register') }}">S'inscrire</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

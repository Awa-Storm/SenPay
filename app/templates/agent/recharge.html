{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div style="font-size: 48px; text-align: center;">📱</div>
        <h1 style="text-align: center; font-size: 22px; font-weight: 600; color: #1a1a2e; margin-top: 6px;">Rechargement de compte</h1>
        <p style="text-align: center; color: #8e8e93; font-size: 14px; margin-bottom: 24px;">Rechargez un compte client</p>

        {% if message %}
            <div style="background: #e8f5e9; padding: 10px; border-radius: 10px; margin-bottom: 16px; font-size: 13px; color: #2e7d32; text-align: center;">
                ✅ {{ message }}
            </div>
        {% endif %}

        {% if error %}
            <div style="background: #fee2e2; padding: 10px; border-radius: 10px; margin-bottom: 16px; font-size: 13px; color: #b91c1c; text-align: center;">
                ❌ {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="tel" name="client_phone" placeholder="📱 Téléphone du client" required>
            <input type="number" name="amount" placeholder="💵 Montant (FCFA)" min="100" step="100" required>
            <button type="submit" class="btn-primary">Recharger →</button>
        </form>

        <div style="margin-top: 20px; text-align: center; font-size: 13px; color: #8e8e93;">
            <a href="/agent/dashboard" style="color: #0e8fa8; font-weight: 600; text-decoration: none;">← Retour</a>
        </div>
    </div>
</div>
{% endblock %}
